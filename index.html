<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RavenTechs — Consola Maestra</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d0d;--surface:#161616;--surface2:#202020;--text:#f0f0f0;--muted:#888;--border:#2e2e2e;--accent:#f0b84a;--danger:#e74c3c;--green:#27ae60;--radius:10px}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
button{cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#screenLogin{display:none;min-height:100vh;align-items:center;justify-content:center;flex-direction:column;gap:14px;padding:20px;text-align:center}
#screenLogin.visible{display:flex}
#screenApp{display:none;min-height:100vh;flex-direction:column}
#screenApp.visible{display:flex}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.btn-out{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:6px 12px;font-size:0.8rem}
.filters{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.chip{padding:5px 12px;border-radius:999px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:0.75rem;font-weight:600;cursor:pointer}
.chip.active{background:var(--accent);color:#111;border-color:var(--accent)}
.search{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 12px;font-size:0.82rem;width:160px}
main{flex:1;padding:14px;max-width:1100px;width:100%;margin:0 auto}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:14px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center}
.stat-n{font-size:1.6rem;font-weight:700;color:var(--accent)}
.stat-l{font-size:0.68rem;color:var(--muted);margin-top:2px}
.sec-title{font-size:0.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:0.68rem;color:var(--muted);font-weight:600;padding:8px 10px;border-bottom:1px solid var(--border);text-transform:uppercase;white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid var(--border);font-size:0.8rem;vertical-align:middle}
tr:hover td{background:var(--surface2);cursor:pointer}
.badge{display:inline-block;padding:3px 8px;border-radius:999px;font-size:0.68rem;font-weight:700}
.panel{position:fixed;right:0;top:0;width:min(380px,100vw);height:100vh;background:var(--surface);border-left:1px solid var(--border);z-index:200;display:none;flex-direction:column}
.panel.open{display:flex}
.panel-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.panel-head h3{font-size:0.88rem;font-weight:700}
.panel-close{background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer}
.panel-body{flex:1;overflow-y:auto;padding:14px 16px}
.psec{font-size:0.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;margin:14px 0 6px}
.psec:first-child{margin-top:0}
.prow{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:0.8rem}
.prow:last-child{border-bottom:none}
.prow-l{color:var(--muted)}
.prow-v{font-weight:600;text-align:right;max-width:190px;word-break:break-all}
.feat-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:0.8rem}
.feat-row:last-child{border-bottom:none}
.toggle{position:relative;width:38px;height:20px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.tog-sl{position:absolute;inset:0;background:var(--border);border-radius:20px;cursor:pointer;transition:.2s}
.tog-sl::before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.toggle input:checked+.tog-sl{background:var(--accent)}
.toggle input:checked+.tog-sl::before{transform:translateX(18px)}
.btn-guardar{width:100%;background:var(--accent);color:#111;border:none;border-radius:8px;padding:10px;font-weight:700;font-size:0.82rem;margin-top:10px;cursor:pointer}
.msg{padding:30px;text-align:center;color:var(--muted);font-size:0.85rem;line-height:1.6}
.btn-google{background:#fff;color:#333;border:none;border-radius:8px;padding:13px 24px;font-size:0.9rem;font-weight:600;display:flex;align-items:center;gap:10px}
.login-err{color:var(--danger);font-size:0.8rem;max-width:280px}
</style>
</head>
<body>

<div id="screenLogin">
  <div style="font-size:44px">🦅</div>
  <div style="font-weight:700;font-size:1.3rem;color:var(--accent)">Consola Maestra</div>
  <div style="font-size:0.82rem;color:var(--muted)">RavenTechs Admin — acceso restringido</div>
  <button class="btn-google" id="btnLogin">
    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285f4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84c-.21 1.13-.84 2.07-1.8 2.71v2.26h2.92c1.71-1.57 2.68-3.88 2.68-6.61z"/><path fill="#34a853" d="M9 18c2.43 0 4.47-.81 5.96-2.18l-2.92-2.26c-.81.54-1.84.87-3.04.87-2.34 0-4.32-1.58-5.03-3.71H.96v2.33C2.44 15.98 5.48 18 9 18z"/><path fill="#fbbc05" d="M3.97 10.72A5.41 5.41 0 0 1 3.68 9c0-.6.1-1.18.29-1.72V4.95H.96A8.96 8.96 0 0 0 0 9c0 1.45.35 2.82.96 4.05l3.01-2.33z"/><path fill="#ea4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0 5.48 0 2.44 2.02.96 4.95l3.01 2.33C4.68 5.16 6.66 3.58 9 3.58z"/></svg>
    Ingresar con Google
  </button>
  <div class="login-err" id="loginErr"></div>
</div>

<div id="screenApp">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:20px">🦅</span>
      <div>
        <div style="font-weight:700;font-size:0.95rem;color:var(--accent)">Consola Maestra</div>
        <div style="font-size:0.68rem;color:var(--muted)">RavenTechs Admin</div>
      </div>
    </div>
    <button class="btn-out" id="btnLogout">Salir</button>
  </div>
  <div class="filters">
    <button class="chip active" data-app="todas">Todas</button>
    <button class="chip" data-app="PizzAR">🍕</button>
    <button class="chip" data-app="PanAR">🥖</button>
    <button class="chip" data-app="CarneAR">🥩</button>
    <button class="chip" data-app="lavAR">🚗</button>
    <button class="chip" data-app="Rodix">🚑</button>
    <button class="chip" data-app="SecurePro">🔒</button>
    <button class="chip" data-app="PuntoVenta">🏪</button>
    <input class="search" id="searchInput" placeholder="Buscar...">
  </div>
  <main>
    <div class="stats">
      <div class="stat"><div class="stat-n" id="statTotal">—</div><div class="stat-l">Clientes</div></div>
      <div class="stat"><div class="stat-n">7</div><div class="stat-l">Apps</div></div>
    </div>
    <div class="sec-title">Clientes</div>
    <div id="tableWrap"><div class="msg">Cargando...</div></div>
  </main>
</div>

<div class="panel" id="panel">
  <div class="panel-head">
    <h3 id="panelTitle">—</h3>
    <button class="panel-close" id="panelClose">✕</button>
  </div>
  <div class="panel-body" id="panelBody"></div>
</div>

<script>
var ADMIN_UID_PIZZAR = 'OJobrR9kvDenfYhQ6gW0OrUaEy33';
var ADMIN_EMAIL = 'rgaraventa@gmail.com';

// UID de rgaraventa en cada proyecto
var ADMIN_UIDS = {
  PizzAR:     'OJobrR9kvDenfYhQ6gW0OrUaEy33',
  PanAR:      'sYwGXqiS1jYvqBrQSXEnIx5djgp2',
  CarneAR:    'pWh8kxI7B0ZJA60dOiMnBljjK0S2',
  lavAR:      'JppYs0lmT2h8YrNV63qBdAgRgo22',
  Rodix:      'pz9r6IT3SkUhjUgxegMFDu6fOOg1',
  SecurePro:  '6tELKUQHg6X0Btg46j5DGRMQwEK2',
  PuntoVenta: 'pg6xcoaum7WYk29NnopP8tXLeMV2'
};

var APP_META = {
  PizzAR:     {emoji:'🍕', color:'#e74c3c', feats:['stockHabilitado','gastosHabilitado','recetasHabilitado']},
  PanAR:      {emoji:'🥖', color:'#e67e22', feats:['stockHabilitado','gastosHabilitado','recetasHabilitado']},
  CarneAR:    {emoji:'🥩', color:'#c0392b', feats:['stockHabilitado','gastosHabilitado','proveedoresHabilitado']},
  lavAR:      {emoji:'🚗', color:'#2980b9', feats:['fidelizacion','multiSucursal','gastos']},
  Rodix:      {emoji:'🚑', color:'#8e44ad', feats:['multiFlota','alertasAvanzadas']},
  SecurePro:  {emoji:'🔒', color:'#16a085', feats:['multiUsuario','presupuestosIlimitados']},
  PuntoVenta: {emoji:'🏪', color:'#f0b84a', feats:['limiteNegocios','cuentaCorriente','empleados']}
};

// Un Firebase app por proyecto — usando el UID correcto en las reglas
var CONFIGS = {
  PizzAR:     {apiKey:'AIzaSyBSKWqpPwUsF-jq_GES1fCwiZZACz0Jz_I',authDomain:'pizzar-b48af.firebaseapp.com',projectId:'pizzar-b48af',storageBucket:'pizzar-b48af.firebasestorage.app',messagingSenderId:'688726516053',appId:'1:688726516053:web:2e11e63aec82225e82cfdc'},
  PanAR:      {apiKey:'AIzaSyCM_V4a6QtXtCKzrCGF2eLVTLxT5aOGlCU',authDomain:'panar-b08f1.firebaseapp.com',projectId:'panar-b08f1',storageBucket:'panar-b08f1.firebasestorage.app',messagingSenderId:'984331564649',appId:'1:984331564649:web:a58cea3d04fdecccaa14f8'},
  CarneAR:    {apiKey:'AIzaSyAffBjEK-m900oKRvI4k6w8eTcgbGxyJok',authDomain:'carnear-1d2c4.firebaseapp.com',projectId:'carnear-1d2c4',storageBucket:'carnear-1d2c4.firebasestorage.app',messagingSenderId:'982486541527',appId:'1:982486541527:web:9a7db609c7a983fc3dbc92'},
  lavAR:      {apiKey:'AIzaSyDVcK9reiQuC6YUpX16DMjyYhtYiH40hbc',authDomain:'lavar-b8b84.firebaseapp.com',projectId:'lavar-b8b84',storageBucket:'lavar-b8b84.firebasestorage.app',messagingSenderId:'1064006581602',appId:'1:1064006581602:web:fb5f0eea1dcff93d7a003b'},
  Rodix:      {apiKey:'AIzaSyDH4GvbdtPqJwUlnRDqtOUoofkL4PTXiew',authDomain:'vehigest-ar.firebaseapp.com',projectId:'vehigest-ar',storageBucket:'vehigest-ar.firebasestorage.app',messagingSenderId:'150404378851',appId:'1:150404378851:web:940ba835e20c4edeb215d6'},
  SecurePro:  {apiKey:'AIzaSyDgpyUd8AExCLy29fwkjc5-mEALA57Wtig',authDomain:'pro-a247e.firebaseapp.com',projectId:'pro-a247e',storageBucket:'pro-a247e.firebasestorage.app',messagingSenderId:'3470750973',appId:'1:3470750973:web:f3d029ed18093ecaf1ba94'},
  PuntoVenta: {apiKey:'AIzaSyAP9PEuKM9ck-a9ltWorlFunxPYXw7trtE',authDomain:'puntoventa-f316c.firebaseapp.com',projectId:'puntoventa-f316c',storageBucket:'puntoventa-f316c.firebasestorage.app',messagingSenderId:'229168693051',appId:'1:229168693051:web:9dcb7d95f39edc4c17011e'}
};

// Inicializar app principal para auth
var mainApp = firebase.initializeApp(CONFIGS.PizzAR, 'main');
var mainAuth = firebase.auth(mainApp);
var mainDb = firebase.firestore(mainApp);

// Apps secundarias — se inicializan al necesitarlas
var apps = {PizzAR: {app: mainApp, db: mainDb}};
function getDb(appName) {
  if (!apps[appName]) {
    var a = firebase.initializeApp(CONFIGS[appName], appName);
    apps[appName] = {app: a, db: firebase.firestore(a)};
  }
  return apps[appName].db;
}

var clientes = [];
var filtroApp = 'todas';
var idToken = null; // Token de Google para llamadas REST

// AUTH
mainAuth.getRedirectResult().then(function(r) {
  if (r && r.user) {
    r.user.getIdToken().then(function(t) { idToken = t; });
  }
}).catch(function(){});

document.getElementById('btnLogin').onclick = function() {
  var p = new firebase.auth.GoogleAuthProvider();
  mainAuth.signInWithRedirect(p);
};
document.getElementById('btnLogout').onclick = function() { mainAuth.signOut(); };

mainAuth.onAuthStateChanged(function(user) {
  if (user && user.uid === ADMIN_UID_PIZZAR) {
    document.getElementById('screenLogin').classList.remove('visible');
    document.getElementById('screenApp').classList.add('visible');
    user.getIdToken().then(function(t) {
      idToken = t;
      cargarTodo();
    });
  } else if (user) {
    mainAuth.signOut();
    document.getElementById('loginErr').textContent = 'Acceso denegado.';
    document.getElementById('screenLogin').classList.add('visible');
  } else {
    document.getElementById('screenApp').classList.remove('visible');
    document.getElementById('screenLogin').classList.add('visible');
  }
});

// CARGA — usa Firestore REST API con el idToken del usuario logueado
// Esto funciona cross-project sin necesidad de autenticarse en cada Firebase app
function firestoreREST(projectId, path, token) {
  var url = 'https://firestore.googleapis.com/v1/projects/' + projectId + '/databases/(default)/documents/' + path + '?pageSize=100';
  return fetch(url, {headers: {'Authorization': 'Bearer ' + token}})
    .then(function(r) { return r.json(); });
}

function extraerValor(v) {
  if (!v) return null;
  if (v.stringValue !== undefined) return v.stringValue;
  if (v.booleanValue !== undefined) return v.booleanValue;
  if (v.integerValue !== undefined) return parseInt(v.integerValue);
  if (v.mapValue) {
    var obj = {};
    var fields = v.mapValue.fields || {};
    Object.keys(fields).forEach(function(k) { obj[k] = extraerValor(fields[k]); });
    return obj;
  }
  return null;
}

function docToObj(doc) {
  var obj = {};
  var fields = doc.fields || {};
  Object.keys(fields).forEach(function(k) { obj[k] = extraerValor(fields[k]); });
  obj._id = (doc.name || '').split('/').pop();
  return obj;
}

function cargarTodo() {
  clientes = [];
  document.getElementById('tableWrap').innerHTML = '<div class="msg">Conectando a los 7 proyectos...</div>';

  var proyectos = {
    PizzAR:     {projectId: 'pizzar-b48af',      col: 'configuracion', esConfig: true},
    PanAR:      {projectId: 'panar-b08f1',       col: 'configuracion', esConfig: true},
    CarneAR:    {projectId: 'carnear-1d2c4',      col: 'configuracion', esConfig: true},
    lavAR:      {projectId: 'lavar-b8b84',        col: 'usuarios',      esConfig: false},
    Rodix:      {projectId: 'vehigest-ar',        col: 'usuarios',      esConfig: false},
    SecurePro:  {projectId: 'pro-a247e',          col: 'usuarios',      esConfig: false},
    PuntoVenta: {projectId: 'puntoventa-f316c',   col: 'usuarios',      esConfig: false}
  };

  var resultados = {};
  Object.keys(proyectos).forEach(function(a) { resultados[a] = '⏳'; });

  function mostrarEstado() {
    var html = '<div style="padding:14px">';
    Object.keys(resultados).forEach(function(a) {
      html += '<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:0.8rem">' +
        '<span>' + APP_META[a].emoji + ' ' + a + '</span><span>' + resultados[a] + '</span></div>';
    });
    html += '</div>';
    document.getElementById('tableWrap').innerHTML = html;
  }

  mostrarEstado();

  var promesas = Object.keys(proyectos).map(function(appName) {
    var p = proyectos[appName];
    return firestoreREST(p.projectId, p.col, idToken).then(function(data) {
      if (data.error) {
        resultados[appName] = '❌ ' + data.error.message.substring(0, 35);
        mostrarEstado();
        return;
      }
      var docs = data.documents || [];
      var encontrados = 0;

      if (p.esConfig) {
        // Apps de caja: buscar doc 'general' en configuracion
        docs.forEach(function(doc) {
          var obj = docToObj(doc);
          if (obj._id !== 'general') return;
          clientes.push({
            uid: ADMIN_UIDS[appName],
            email: obj.whatsapp ? 'WA:' + obj.whatsapp : '—',
            nombre: obj.nombre || obj.nombreLocal || '(sin nombre)',
            app: appName,
            features: obj.features || {},
            status: 'activo',
            raw: obj
          });
          encontrados++;
        });
      } else {
        // Apps multi-usuario: buscar docs con email != admin
        docs.forEach(function(doc) {
          var obj = docToObj(doc);
          if (!obj.email || obj.email === ADMIN_EMAIL) return;
          var rol = obj.rol || '';
          if (rol && rol !== 'owner' && rol !== 'dueno' && rol !== 'admin') return;
          clientes.push({
            uid: obj._id,
            email: obj.email,
            nombre: obj.nombre || obj.displayName || obj.nombreEmpresa || '—',
            app: appName,
            features: obj.features || {},
            status: obj.status || 'activo',
            raw: obj
          });
          encontrados++;
        });
      }

      resultados[appName] = encontrados > 0 ? '✅ ' + encontrados + ' reg.' : '⚠️ 0 registros';
      mostrarEstado();
    }).catch(function(e) {
      resultados[appName] = '❌ ' + e.message.substring(0, 35);
      mostrarEstado();
    });
  });

  Promise.all(promesas).then(function() {
    document.getElementById('statTotal').textContent = clientes.length;
    if (clientes.length > 0) {
      setTimeout(renderTabla, 1500); // Mostrar resultados 1.5s después para que se vea el estado
    }
  });
}

function clientesFiltrados() {
  var q = (document.getElementById('searchInput').value || '').toLowerCase();
  return clientes.filter(function(c) {
    return (filtroApp === 'todas' || c.app === filtroApp) &&
      (!q || c.email.toLowerCase().includes(q) || c.nombre.toLowerCase().includes(q));
  });
}

function renderTabla() {
  var lista = clientesFiltrados();
  document.getElementById('statTotal').textContent = lista.length;
  if (!lista.length) {
    document.getElementById('tableWrap').innerHTML = '<div class="msg">Sin resultados</div>';
    return;
  }
  var rows = lista.map(function(c) {
    var m = APP_META[c.app];
    var feats = Object.entries(c.features||{}).filter(function(e){return e[1]===true;}).map(function(e){return e[0];}).join(', ') || '—';
    return '<tr onclick="abrirPanel(\'' + c.uid + '\',\'' + c.app + '\')">' +
      '<td><span class="badge" style="background:' + m.color + '22;color:' + m.color + '">' + m.emoji + ' ' + c.app + '</span></td>' +
      '<td>' + c.email + '</td>' +
      '<td>' + c.nombre + '</td>' +
      '<td style="color:var(--muted);font-size:0.72rem">' + feats + '</td>' +
      '</tr>';
  }).join('');
  document.getElementById('tableWrap').innerHTML =
    '<div class="table-wrap"><table><thead><tr><th>App</th><th>Email/Contacto</th><th>Nombre</th><th>Features</th></tr></thead><tbody>' + rows + '</tbody></table></div>';
}

function abrirPanel(uid, appName) {
  var c = clientes.find(function(x){return x.uid===uid&&x.app===appName;});
  if (!c) return;
  var m = APP_META[appName];
  document.getElementById('panelTitle').textContent = m.emoji + ' ' + c.email;
  var featsHTML = (m.feats||[]).map(function(k){
    return '<div class="feat-row"><span>' + k + '</span>' +
      '<label class="toggle"><input type="checkbox" class="ft" data-key="' + k + '" ' + (c.features&&c.features[k]?'checked':'') + '><span class="tog-sl"></span></label></div>';
  }).join('');
  document.getElementById('panelBody').innerHTML =
    '<div class="psec">Datos</div>' +
    '<div class="prow"><span class="prow-l">App</span><span class="prow-v">' + appName + '</span></div>' +
    '<div class="prow"><span class="prow-l">Email</span><span class="prow-v">' + c.email + '</span></div>' +
    '<div class="prow"><span class="prow-l">Nombre</span><span class="prow-v">' + c.nombre + '</span></div>' +
    '<div class="prow"><span class="prow-l">Estado</span><span class="prow-v">' + c.status + '</span></div>' +
    '<div class="prow"><span class="prow-l">UID</span><span class="prow-v" style="font-size:0.65rem;color:var(--muted)">' + uid + '</span></div>' +
    '<div class="psec">Features Plus</div>' + featsHTML +
    '<button class="btn-guardar" onclick="guardarFeatures(\'' + uid + '\',\'' + appName + '\')">Guardar features</button>';
  document.getElementById('panel').classList.add('open');
}

function guardarFeatures(uid, appName) {
  var btn = document.querySelector('.btn-guardar');
  btn.textContent = 'Guardando...'; btn.disabled = true;
  var nuevas = {};
  document.querySelectorAll('.ft').forEach(function(t){nuevas[t.dataset.key]=t.checked;});
  // Guardar en Firestore via SDK (ya autenticado en mainApp = PizzAR)
  // Para los otros proyectos usamos REST API con PATCH
  var p = {
    PizzAR:'pizzar-b48af', PanAR:'panar-b08f1', CarneAR:'carnear-1d2c4',
    lavAR:'lavar-b8b84', Rodix:'vehigest-ar', SecurePro:'pro-a247e', PuntoVenta:'puntoventa-f316c'
  };
  var projectId = p[appName];
  var isConfig = ['PizzAR','PanAR','CarneAR'].indexOf(appName) >= 0;
  var docPath = isConfig ? 'configuracion/general' : 'usuarios/' + uid;
  var fields = {};
  Object.keys(nuevas).forEach(function(k) {
    fields['features.' + k] = {booleanValue: nuevas[k]};
  });
  var url = 'https://firestore.googleapis.com/v1/projects/' + projectId + '/databases/(default)/documents/' + docPath +
    '?updateMask.fieldPaths=' + Object.keys(fields).join('&updateMask.fieldPaths=');
  fetch(url, {
    method: 'PATCH',
    headers: {'Authorization': 'Bearer ' + idToken, 'Content-Type': 'application/json'},
    body: JSON.stringify({fields: fields})
  }).then(function() {
    var c = clientes.find(function(x){return x.uid===uid&&x.app===appName;});
    if (c) c.features = nuevas;
    btn.textContent = '✅ Guardado';
    setTimeout(function(){btn.textContent='Guardar features';btn.disabled=false;}, 2000);
  }).catch(function(e){
    btn.textContent = 'Error: ' + e.message.substring(0,20);
    btn.disabled = false;
  });
}
